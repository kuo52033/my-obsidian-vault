kind: Service
apiVersion: v1
metadata:
  name: redis
  namespace: bms
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: redis
  namespace: bms
spec:
  selector:
    matchLabels:
      app: redis
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - image: redis:6.2.6
          name: redis
          ports:
            - containerPort: 6379

      nodeSelector:
        app: bms
        env: production
