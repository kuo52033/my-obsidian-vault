kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: bms-management-ingress
  namespace: bms
  annotations:
    kubernetes.io/ingress.class: "bms"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/affinity: "cookie"
spec:
  ingressClassName: bms
  rules:
    - host: bms-m.rcppay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bms-management-service
                port:
                  number: 80

---

kind: Service
apiVersion: v1
metadata:
  name: bms-management-service
  namespace: bms
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: bms-management-deployment

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: bms-management-deployment
  namespace: bms
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bms-management-deployment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bms-management-deployment
    spec:
      containers:
        - name: management
          image: 741328073657.dkr.ecr.ap-northeast-2.amazonaws.com/bms:{TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          command: [ "pm2-runtime" ]
          args: [ "start", "./pm2-processes/production.json", "--only", "management" ]
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 15
            successThreshold: 1
            periodSeconds: 15
          volumeMounts:
            - name: log
              mountPath: /var/log/bms
          resources:
            limits:
              cpu: "2"
              memory: "2.0Gi"
            requests:
              cpu: "0.1"
              memory: "200Mi"

      volumes:
        - name: log
          hostPath:
            path: /var/log/bms/production
            type: DirectoryOrCreate

      nodeSelector:
        app: bms
        env: production
